<!DOCTYPE html>

    <title>Contador</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <h1>Contador de Números</h1>

    <section>
        <div>
        <p>Inicio:
                <input type="Number" value="" id="inicio">

            <p>Fim:
                <input type="Number" value="" id="fim">

                <input type="Number" value="" id="passo">
            </p>

                <input type="button" value="Iniciar Contagem" onclick="contar()">

        <div id="res">
            Aqui será exibido o resultado da contagem.
        </div>
    </section>
    <footer>
        <p>&copy; O site é <strong>MEU!</strong></p>
