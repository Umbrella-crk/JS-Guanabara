<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt('Qual seu nome?')
        document.write(`Olá ${nome}, Seu nome tem ${nome.length} letras </br>`)
        document.writeln(`Seu nome em maiúsculo é ${nome.toUpperCase()}`)
        // (var).toFixed(2) = transforma 1 casa decimal em 2
        // (var).toLaceleString('Lingua', {style: 'currency', currency: 'tipo de dinheiro'})= transforma o número para a forma de dinheiro.
    </script>
</body>
</html>
