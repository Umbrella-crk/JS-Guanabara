<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lol Xisde</title>
    <style>
        body {
            background-color: rgb(20, 116, 103); /* comentario css3 */
            color:white;
            font: normal 25pt Arial;
        }
        h1 {
            color:beige
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição.</p> <!-- comentario hmtl5 -->
    <script>
        var n1 = Number.parseInt(window.prompt ('Digite um número'))
        var n2 = Number.parseInt(window.prompt ('Digite mais um número'))
        var s = n1 + n2 
        // 'Eu estou aprendendo s' não faz interpolação
        // 'Eu estou aprendendo' + s usa concatenação
        // `Eu estou aprendendo ${s}` usa template string
        // s.length = quantos caracteres a string tem
        // s.toUpperCase() = tudo para 'MAIÚSCULAS'
        // s.toLowerCase() = tudo para 'minúsculas'
        window.alert (`a some entre os números é ${s}`)
        // (number + number) adição
        // (string + stirng) Concatenação
        // String(n) = converte numero para string
        // n.toString() converte numero para string
        // Number() Converte string para numero
    </script>
</body>
</html>
