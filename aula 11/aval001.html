<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação: Região do mundo</title>
</head>
<body>
    <h1>de Qual Pais Você é?</h1>
    <input type="text" name="txtpais" id="txtpais"/>
    <input type="button" value="Verificar" onclick="Verificar()"/>
    <div id="res"></div>
    <script>
        function Verificar() {
            var txtp = window.document.querySelector('input#txtpais')
            var res = window.document.querySelector('div#res')
            var pais = txtp.value.toLowerCase()
            res.innerHTML = `<p>Você é do(a) <strong>${pais}</strong></p>`
            if (pais == 'brasil') {
                res.innerHTML += `<p>Você é Brasileiro!</p>`
            } else {
                res.innerHTML += `<p>Você é Estrangeiro!</p>`
            }
        }
    </script>
    
</body>
</html>
