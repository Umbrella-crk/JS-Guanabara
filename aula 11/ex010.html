<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detran</title>
    <style>
        h1#titulo {
            font: normal 20pt Arial;
            background: gray;
            width: 416px;
            height: 50px;
            color: white;
            line-height: 50px;
            text-align: center;

        }
        p1#Velocidade {
            font: normal 11pt Arial;
            color: black;
        }
    </style>
</head>
<body>
    <h1 id="titulo">Sistema de Multas</h1>
    <p1 id="Velocidade">Velocidade do carro: <input type="Number" name="txtvel" id="txtvel"> Km/h </p1>
    <input type="button" value="Verificar" onclick="calcular()"/>
    <div id="res">

    </div>
    <script>
        function calcular() {
            var txtv = window.document.querySelector('input#txtvel')
            var res = window.document.querySelector('div#res')
            var vel = Number(txtv.value)
            res.innerHTML = `<p>Sua velocidade atual é de <strong>${vel}</strong> Km/h</p>`
            if (vel > 60) {
                res.innerHTML += `<p>Você está sendo <strong>MULTADO</strong> por excesso de velocidade!</p>`
            } else {
                res.innerHTML += `<p>Dirija sempre com Segurança!</p>`
            }

        }

    </script>
    
</body>
</html>
